<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driim - Coming Soon</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="A new way to explore your dreams. Coming soon from Siddha Tantra Arts.">
    <meta name="author" content="Siddha Tantra Arts">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://driim.app/">
    <meta property="og:title" content="Driim - Coming Soon">
    <meta property="og:description" content="A new way to explore your dreams.">
    <meta property="og:image" content="/og-image.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Driim - Coming Soon">
    <meta name="twitter:description" content="A new way to explore your dreams.">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --deep-indigo: #1a1a2e;
            --mystic-purple: #4a3f6b;
            --soft-violet: #7c6a9a;
            --dawn-rose: #d4a5a5;
            --golden-light: #e8c87d;
            --cream: #f5f0e8;
            --soft-white: #fdfcfa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--deep-indigo) 0%, var(--mystic-purple) 50%, var(--soft-violet) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--soft-white);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 5rem;
            font-weight: 500;
            letter-spacing: 0.3em;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1.5s ease-out;
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 400;
            font-style: italic;
            color: var(--dawn-rose);
            margin-bottom: 3rem;
            letter-spacing: 0.05em;
            animation: fadeIn 1.5s ease-out 0.3s both;
        }

        .signup-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            animation: fadeIn 1.5s ease-out 0.6s both;
        }

        .signup-form input[type="email"] {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.95);
            color: var(--deep-indigo);
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        .signup-form input[type="email"]::placeholder {
            color: var(--soft-violet);
        }

        .signup-form input[type="email"]:focus {
            outline: none;
            box-shadow: 0 0 0 3px var(--golden-light);
        }

        .signup-form button {
            width: 100%;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--golden-light) 0%, var(--dawn-rose) 100%);
            color: var(--deep-indigo);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .signup-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .signup-form button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .note {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-top: 1rem;
        }

        .form-message {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-size: 0.95rem;
            display: none;
        }

        .form-message.success {
            display: block;
            background: rgba(232, 200, 125, 0.2);
            color: var(--golden-light);
            border: 1px solid var(--golden-light);
        }

        .form-message.error {
            display: block;
            background: rgba(212, 165, 165, 0.2);
            color: var(--dawn-rose);
            border: 1px solid var(--dawn-rose);
        }

        footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            animation: fadeIn 1.5s ease-out 0.9s both;
        }

        footer a {
            color: var(--dawn-rose);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .logo {
                font-size: 3.5rem;
                letter-spacing: 0.2em;
            }

            .tagline {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="logo">DRIIM</h1>
        <p class="tagline">A new way to explore your dreams</p>

        <form class="signup-form" id="waitlist-form" action="https://formspree.io/f/mzdrqpgz" method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Notify Me</button>
        </form>
        <p class="note">Coming soon. Be the first to know.</p>
        <div class="form-message" id="form-message"></div>
    </div>

    <footer>
        <a href="https://siddhatantraarts.com" target="_blank">Siddha Tantra Arts</a> · Sweden
    </footer>

    <script>
        document.getElementById('waitlist-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const form = e.target;
            const button = form.querySelector('button');
            const messageEl = document.getElementById('form-message');

            button.disabled = true;
            button.textContent = 'Joining...';

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    messageEl.textContent = "You're on the list.";
                    messageEl.className = 'form-message success';
                    form.querySelector('input[type="email"]').value = '';
                } else {
                    throw new Error('Failed');
                }
            } catch (error) {
                messageEl.textContent = 'Something went wrong. Try again.';
                messageEl.className = 'form-message error';
            }

            button.disabled = false;
            button.textContent = 'Notify Me';
        });
    </script>

</body>
</html>
